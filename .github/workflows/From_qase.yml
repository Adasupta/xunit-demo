name: Trigger from Qase

on:
  workflow_dispatch:
    inputs:
      qase_api_base_url:
        description: "Qase API URL"
        required: true
      qase_report:
        description: "Enabled/disabled reporting to Qase"
        required: true
      qase_project_code:
        description: "Qase project code"
        required: true
      qase_run_id:
        description: "Qase Run ID"
        required: true
      qase_run_complete:
        description: "Qase Run autocomplete"
        required: true

env:
  QASE_API_BASE_URL: ${{ inputs.qase_api_base_url }}
  QASE_TESTOPS_PROJECT: ${{ inputs.qase_project_code }}
  QASE_TESTOPS_RUN_ID: ${{ inputs.qase_run_id }}
  QASE_TESTOPS_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}
  QASE_TESTOPS_RUN_COMPLETE: true
  QASE_MODE: "testops"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: cskmnrpt/qase-link-run@v2
        env:
          QASE_TESTOPS_API_TOKEN: ${{ env.QASE_TESTOPS_API_TOKEN }}

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Debug - Print Qase Configuration
        run: |
          echo "QASE_MODE: $QASE_MODE"
          echo "QASE_TESTOPS_PROJECT: $QASE_TESTOPS_PROJECT"
          echo "QASE_TESTOPS_RUN_ID: $QASE_TESTOPS_RUN_ID"
          echo "QASE_API_BASE_URL: $QASE_API_BASE_URL"
          echo "QASE_TESTOPS_RUN_COMPLETE: $QASE_TESTOPS_RUN_COMPLETE"
          echo "Token exists: ${{ secrets.QASE_API_TOKEN != '' }}"

      - name: Restore dependencies
        run: dotnet restore

      - name: Debug - Verify Qase.TestOps.Xunit package
        run: |
          echo "Checking for NEW Qase.TestOps.Xunit package..."
          dotnet list package | grep -i qase
          echo ""
          echo "⚠️ You should see 'Qase.TestOps.Xunit' NOT 'Qase.XUnit.Reporter'"

      - name: Build project
        run: dotnet build --no-restore --configuration Release

      - name: Run xUnit tests with Qase reporting
        env:
          QASE_MODE: testops
          QASE_TESTOPS_PROJECT: ${{ inputs.qase_project_code }}
          QASE_TESTOPS_RUN_ID: ${{ inputs.qase_run_id }}
          QASE_TESTOPS_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}
          QASE_API_BASE_URL: ${{ inputs.qase_api_base_url }}
          QASE_TESTOPS_RUN_COMPLETE: ${{ inputs.qase_run_complete }}
        run: |
          echo "Starting tests with Qase reporting..."
          dotnet test --no-build --configuration Release --verbosity normal
          echo "✅ Tests completed - check above for Qase reporter output"

      - name: Debug - Verify Qase reporter ran
        if: always()
        run: |
          echo "Checking if Qase reporter output appeared in test logs..."
          echo "You should see messages like 'Qase TestOps reporter' or 'Publishing results to Qase' above"